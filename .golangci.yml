# golangci-lint configuration for ipp-usb
#
# The linter set is deliberately curated rather than "everything on":
# ipp-usb is a cgo daemon, so we enable the checks that are reliable and
# high-signal on this codebase and leave the noisier style linters off.
# Add more over time as the tree is cleaned up.

run:
  # Build the same way the daemon is built so cgo files are analysed.
  build-tags:
    - nethttpomithttp2
  timeout: 5m

# The vendored tree is third-party code; never lint it.
issues:
  exclude-dirs:
    - vendor
  # Show every issue rather than golangci-lint's default per-linter caps.
  max-issues-per-linter: 0
  max-same-issues: 0

  # Narrowly-scoped exclusions for findings that are false positives or
  # deliberate on this codebase.  Everything else (and all new code) is still
  # linted normally.
  exclude-rules:
    # Avahi's own C enum is spelled AVAHI_ENTRY_GROUP_UNCOMMITED (an upstream
    # typo).  The Go code references C.AVAHI_ENTRY_GROUP_UNCOMMITED and the log
    # string mirrors that symbol, so it must keep Avahi's spelling.
    - path: dnssd_avahi.go
      linters: [misspell]
      text: "UNCOMMITED"

    # cgo callback / function-pointer casts (libusb_*_cb_fn, device-handle
    # pointer types).  unconvert cannot see the C side and reports these
    # required conversions as redundant.
    - path: usbio_libusb.go
      linters: [unconvert]

    # Deliberate: a USB transport has no external cancellation channel, so the
    # (deprecated) http.Request.Cancel field is explicitly cleared on purpose.
    - path: usbtransport.go
      linters: [staticcheck]
      text: "SA1019: outreq.Cancel"

    # DNSSdTxtRecord.export is exercised by ipp_test.go; the unused linter does
    # not count that test-only user.
    - path: dnssd.go
      linters: [unused]
      text: "DNSSdTxtRecord.export"

linters:
  disable-all: true
  enable:
    - govet         # suspicious constructs (also run standalone in CI)
    - staticcheck   # extensive correctness / bug checks
    - ineffassign   # ineffectual assignments
    - unused        # unused code
    - misspell      # common English misspellings in comments/strings
    - unconvert     # unnecessary type conversions
    - gofmt         # canonical formatting
    - goimports     # import grouping / formatting

linters-settings:
  gofmt:
    simplify: true
